<div id="PhotoGallery1" style="position:absolute;left:0px;top:382px;width:970px;height:163px;overflow:scroll;z-index:3">
<script>
    // CONFIGURAÇÕES
    const usuarioGithub = 'ModzProd';
    const nomeRepositorio = 'ModzProdAIPics';
    const pastaImagens = 'images/galeria/logos'; 
    const idDestino = 'PhotoGallery1';       // ID do seu objeto HTML

    const url = `https://api.github.com/repos/${usuarioGithub}/${nomeRepositorio}/contents/${pastaImagens}`;

    fetch(url)
        .then(response => response.json())
        .then(data => {
            // Filtra imagens
            const imagens = data.filter(file => file.name.match(/\.(jpg|jpeg|png|gif|webp)$/i));
            if (imagens.length === 0) return;

            const container = document.getElementById(idDestino);
            if (!container) return;

            // --- 1. CONTAINER PRINCIPAL (Linha da Netflix) ---
            container.style.position = "relative";
            container.style.width = "100%";
            container.style.maxWidth = "900px";
            container.style.margin = "0 auto";
            container.style.padding = "20px 40px"; // Espaço para os botões laterais
            container.style.backgroundColor = "transparent"; // Fundo escuro (Estilo Netflix)
            container.style.borderRadius = "8px";
            container.style.overflow = "hidden"; // Esconde o que sai da linha

            // --- 2. TRILHA DE ROLAGEM (Onde as imagens vivem) ---
            const track = document.createElement('div');
            track.style.display = "flex";
            track.style.gap = "10px";
            track.style.overflowX = "auto"; // Rolagem horizontal
            track.style.scrollBehavior = "smooth"; // Rolagem suave
            track.style.paddingBottom = "10px"; // Espaço para a barra de rolagem (que vamos esconder)
            track.style.width = "100%";

            // Esconder a barra de rolagem nativa (estilo app)
            track.style.scrollbarWidth = "none"; // Firefox
            track.style.msOverflowStyle = "none"; // IE/Edge
            const styleSheet = document.createElement("style");
            styleSheet.innerText = `#${idDestino} ::-webkit-scrollbar { display: none; }`;
            document.head.appendChild(styleSheet);

            // --- 3. CRIAR AS CARDS (Miniaturas) ---
            imagens.forEach(file => {
                const card = document.createElement('div');
                
                // Tamanho do Card (Padrão Paisagem 16:9, mas pode ajustar)
                card.style.minWidth = "150px"; 
                card.style.height = "150px";  // Proporção 16:9 (Parece banner de série)
                card.style.flexShrink = "0";  // Impede que o card encolha
                card.style.borderRadius = "4px";
                card.style.cursor = "pointer";
                card.style.transition = "transform 0.3s ease, z-index 0.3s ease";
                card.style.position = "relative";
                card.style.overflow = "hidden";

                // Imagem dentro do Card
                const img = document.createElement('img');
                img.src = file.download_url;
                img.style.width = "100%";
                img.style.height = "100%";
                img.style.objectFit = "cover"; // Corta a imagem para preencher o quadrado

                // --- EFEITO NETFLIX (HOVER) ---
                card.onmouseenter = function() {
                    this.style.transform = "scale(1.2)"; // Aumenta tamanho
                    this.style.zIndex = "100";         // Vem para frente dos outros
                    this.style.boxShadow = "0 0 20px rgba(0,0,0,0.8)";
                    this.style.border = "2px solid #fff";
                };
                card.onmouseleave = function() {
                    this.style.transform = "scale(1)";
                    this.style.zIndex = "1";
                    this.style.boxShadow = "none";
                    this.style.border = "none";
                };

                // Clique para abrir imagem grande (simples)
                card.onclick = function() {
                    window.open(file.download_url, '_blank');
                };

                card.appendChild(img);
                track.appendChild(card);
            });

            container.appendChild(track);

            // --- 4. BOTÕES DE NAVEGAÇÃO (Setas) ---
            const criarSeta = (lado, posicaoCSS) => {
                const btn = document.createElement('div');
                btn.innerHTML = "&#9654"; // Seta Unicode
                btn.style.position = "absolute";
                btn.style[posicaoCSS] = "10px";
                btn.style.top = "50%";
                btn.style.transform = `translateY(-50%) ${posicaoCSS === 'left' ? 'rotate(180deg)' : ''}`;
                btn.style.width = "40px";
                btn.style.height = "80px";
                btn.style.backgroundColor = "rgba(0,0,0,0.5)";
                btn.style.color = "white";
                btn.style.display = "flex";
                btn.style.alignItems = "center";
                btn.style.justifyContent = "center";
                btn.style.cursor = "pointer";
                btn.style.borderRadius = "4px";
                btn.style.zIndex = "200";
                btn.style.transition = "background 0.2s";
                btn.style.opacity = "100"; // Escondido por padrão
                btn.style.pointerEvents = "none";

                // Aparece ao passar o mouse no container geral
                container.onmouseenter = () => {
                    btn.style.opacity = "1";
                    btn.style.pointerEvents = "auto";
                };
                container.onmouseleave = () => {
                    btn.style.opacity = "0";
                    btn.style.pointerEvents = "none";
                };

                btn.onmouseover = () => btn.style.backgroundColor = "rgba(255,255,255,0.2)";
                btn.onmouseout = () => btn.style.backgroundColor = "rgba(0,0,0,0.5)";

                btn.onclick = () => {
                    const scrollAmount = container.clientWidth * 0.8;
                    if (lado === 'esquerda') track.scrollBy({ left: -scrollAmount, behavior: 'smooth' });
                    if (lado === 'direita') track.scrollBy({ left: scrollAmount, behavior: 'smooth' });
                };

                container.appendChild(btn);
            };

            criarSeta('esquerda', 'left');
            criarSeta('direita', 'right');

        })
        .catch(error => console.error('Erro ao carregar carrossel Netflix:', error));
</script></div>
