<div id="PhotoGallery1" style="position:absolute;left:24px;top:416px;width:946px;height:709px;z-index:3">
<script>
    // CONFIGURAÇÕES
    const usuarioGithub = 'ModzProd';
    const nomeRepositorio = 'ModzProdAIPics';
    const pastaImagens = 'images/galeria'; 
    const idDestino = 'PhotoGallery1';       // ID configurado no objeto HTML

    // URL da API do GitHub
    const url = `https://api.github.com/repos/${usuarioGithub}/${nomeRepositorio}/contents/${pastaImagens}`;

    fetch(url)
        .then(response => response.json())
        .then(data => {
            // Tenta encontrar o container pelo ID
            const container = document.getElementById(idDestino);
            
            if (!container) {
                console.error('ERRO: Não encontrei nenhum objeto com ID "' + idDestino + '" na página.');
                console.error('Lembre-se de usar o objeto "HTML" (</>) e não o objeto "Photo Gallery".');
                return;
            }

            // Estilo do Container (Flexbox para alinhar fotos)
            container.style.display = "flex";
            container.style.flexWrap = "wrap";
            container.style.gap = "15px";
            container.style.justifyContent = "center";
            container.style.width = "100%";

            // Varre os arquivos retornados
            data.forEach(file => {
                // Verifica se é uma imagem
                if (file.name.match(/\.(jpg|jpeg|png|gif|webp)$/i)) {
                    
                    // Cria o link (abre a foto original ao clicar)
                    const link = document.createElement('a');
                    link.href = file.download_url;
                    link.target = "_blank"; 

                    // Cria a imagem de exibição (thumbnail)
                    const img = document.createElement('img');
                    img.src = file.download_url; 
                    
                    // Estilo das Imagens
                    img.style.width = "200px"; 
                    img.style.height = "200px";
                    img.style.objectFit = "cover";
                    img.style.borderRadius = "8px";
                    img.style.boxShadow = "0 4px 6px rgba(0,0,0,0.3)";
                    img.style.cursor = "pointer";
                    img.style.transition = "transform 0.3s ease";
                    
                    // Efeito de Zoom ao passar o mouse
                    img.onmouseover = function() { this.style.transform = "scale(1.05)"; };
                    img.onmouseout = function() { this.style.transform = "scale(1)"; };

                    // Adiciona à página
                    link.appendChild(img);
                    container.appendChild(link);
                }
            });
        })
        .catch(error => console.error('Erro ao carregar galeria:', error));
</script></div>
